name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    permissions:
      contents: write   # required to push version bump commits and tags
      packages: write   # required to publish packages
      id-token: write   # enable GitHub OIDC token issuance for NuGet login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history for changelog generation
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TYPE="${{ github.event.inputs.release_type }}"

          # Get latest semantic tag like v1.2.3
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)

          if [[ -z "$LATEST_TAG" ]]; then
            BASE_VERSION="0.0.0"
          else
            BASE_VERSION="${LATEST_TAG#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          case "$RELEASE_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Invalid release_type: $RELEASE_TYPE" >&2
              exit 1
              ;;
          esac

          VERSION="$MAJOR.$MINOR.$PATCH"

          echo "Latest tag: ${LATEST_TAG:-<none>}"
          echo "Base version: $BASE_VERSION"
          echo "Next version: $VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version in Directory.Build.props
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" Directory.Build.props
          sed -i "s|<InformationalVersion>.*</InformationalVersion>|<InformationalVersion>${VERSION}</InformationalVersion>|" Directory.Build.props
          echo "Bumped version to ${VERSION}"
          grep "<Version>" Directory.Build.props

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add Directory.Build.props
          git diff --staged --quiet || git commit -m "chore(release): bump version to ${VERSION}"

      - name: Tag release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG" -m "Release $TAG"
          git push origin HEAD:main
          git push origin "$TAG"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag — including all commits"
            RANGE="HEAD"
          else
            echo "Changelog from ${PREV_TAG} to HEAD"
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Group by conventional commit type
          {
            echo "## What's Changed"
            echo ""

            FEATURES=$(git log $RANGE --pretty=format:"%s" | grep -E "^feat(\(.+\))?:" | sed 's/^feat[^:]*: //')
            FIXES=$(git log $RANGE --pretty=format:"%s" | grep -E "^fix(\(.+\))?:" | sed 's/^fix[^:]*: //')
            IMPROVEMENTS=$(git log $RANGE --pretty=format:"%s" | grep -E "^(refactor|perf|improvement)(\(.+\))?:" | sed 's/^[^:]*: //')
            DOCS=$(git log $RANGE --pretty=format:"%s" | grep -E "^docs(\(.+\))?:" | sed 's/^docs[^:]*: //')
            OTHER=$(git log $RANGE --pretty=format:"%s" | grep -vE "^(feat|fix|refactor|perf|improvement|docs|chore|test|ci)(\(.+\))?:" | grep -v "^Merge")

            if [ -n "$FEATURES" ]; then
              echo "### ✨ New Features"
              echo "$FEATURES" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$IMPROVEMENTS" ]; then
              echo "### 🔧 Improvements"
              echo "$IMPROVEMENTS" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### 📚 Documentation"
              echo "$DOCS" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            echo "**Full changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          } > RELEASE_NOTES.md

          cat RELEASE_NOTES.md
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and pack
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          dotnet pack src/gateway/BotNexus.Cli \
            -c Release \
            --nologo \
            -p:Version=${VERSION} \
            -p:SourceRevisionId=${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.NOTES }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: src/gateway/BotNexus.Cli/bin/Release/*.nupkg

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: |
          dotnet nuget push src/gateway/BotNexus.Cli/bin/Release/*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
